<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friend Suggestion | VIT - AP</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #ffd700;
      --text: #e0f2f1;
      --heading: #ffd700;
      --status: #00e5ff;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, rgba(42, 10, 42, 0.85), rgba(0, 31, 63, 0.85), rgba(0, 51, 102, 0.85)),
                  url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1920&q=80') center/cover fixed;
      background-size: 400% 400%, cover;
      animation: gradient 12s ease infinite;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%, center; }
      50% { background-position: 100% 50%, center; }
      100% { background-position: 0% 50%, center; }
    }

    .vit-banner {
      background: rgba(0,0,0,0.4);
      text-align: center;
      padding: 15px;
      font-weight: bold;
      color: var(--primary);
    }

    .container {
      flex: 1;
      max-width: 1000px;
      margin: auto;
      padding: 20px;
      text-align: center;
    }

    #main-app { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: var(--primary);
      border: none;
      cursor: pointer;
    }

    #output {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0,0,0,0.5);
      color: var(--status);
    }
  </style>
</head>

<body>

<header class="vit-banner">🎓 VIT - AP University</header>

<div id="login-section" class="container">
  <h2>Login</h2>
  <form onsubmit="handleLogin(event)">
    <input type="text" id="loginUsername" placeholder="Enter Name" required>
    <input type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
</div>

<div id="main-app" class="container">
  <h1>Friend Suggestion Network</h1>
  <p id="user-greeting"></p>

  <div class="grid">
    <div class="card">
      <h3>Add User</h3>
      <input id="name">
      <button onclick="addUser()">Add</button>
    </div>

    <div class="card">
      <h3>Add Friend</h3>
      <input id="user1">
      <input id="user2">
      <button onclick="addFriend()">Connect</button>
    </div>

    <div class="card">
      <h3>Mutual Friends</h3>
      <input id="u1">
      <input id="u2">
      <button onclick="getMutual()">Find</button>
    </div>

    <div class="card">
      <h3>Recommendations</h3>
      <input id="recUser">
      <button onclick="getRecommendations()">Recommend</button>
    </div>
  </div>

  <div id="output"></div>
</div>

<footer class="vit-banner">VIT - AP © 2026</footer>

<script src="script.js"></script>

<script>
function handleLogin(e) {
  e.preventDefault();
  const user = document.getElementById("loginUsername").value;

  document.getElementById("login-section").style.display = "none";
  document.getElementById("main-app").style.display = "block";
  document.getElementById("user-greeting").innerText = "Welcome " + user;
}
</script>

</body>
</html>
